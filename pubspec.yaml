name: oracle_fee_manager
description: ORACLE — School Fee Management System for Hackathon

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Backend
  supabase_flutter: ^2.5.0

  # Navigation
  go_router: ^13.2.0

  # Charts
  fl_chart: ^0.68.0

  # Animations
  flutter_animate: ^4.5.0

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0

  # Icons
  cupertino_icons: ^1.0.8
  csv: ^8.0.0
  file_picker: ^11.0.2
  shared_preferences: ^2.5.5
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
